    <path d="M440 328 l14 17 -14 17" stroke="#fff" stroke-width="5"
      fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M424 322 l-8 40" stroke="#c770f0" stroke-width="5"
