  </g>

  <!-- floating terminal chip -->
  <g>
    <rect x="60" y="330" width="150" height="70" rx="14" fill="#1a1033"
      stroke="#667eea" stroke-width="2" />
    <path d="M78 352 l14 12 -14 12" stroke="#7ee8b0" stroke-width="4"
      fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="104" y="374" width="60" height="7" rx="3.5" fill="#8a6bb8" />
  </g>

  <!-- floating gear -->
  <g transform="translate(452 176)" fill="#c770f0" opacity="0.9">
    <path d="M0 -18 l4 0 2 6 5 2 5 -3 3 3 -3 5 2 5 6 2 0 4 -6 2 -2 5 3 5 -3 3 -5 -3 -5 2 -2 6 -4 0 -2 -6 -5 -2 -5 3 -3 -3 3 -5 -2 -5 -6 -2 0 -4 6 -2 2 -5 -3 -5 3 -3 5 3 5 -2 2 -6z" />
    <circle cx="0" cy="0" r="6" fill="#241245" />
  </g>
